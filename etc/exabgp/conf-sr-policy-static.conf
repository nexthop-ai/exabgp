# ==============================================================================
# ExaBGP SR-Policy - Hierarchical Static Section Example
# ==============================================================================
# This example demonstrates the hierarchical configuration syntax for SR-Policy
# routes using the static { } section, which is more readable than the inline
# announce { } syntax.
#
# Comparison:
#   - Inline (announce section): Long single-line format with backslashes
#   - Hierarchical (static section): Structured multi-line format with braces
#
# Both syntaxes are functionally equivalent - use whichever you prefer!
# ==============================================================================

neighbor 192.0.2.100 {
	router-id 10.0.0.1;
	local-address 192.0.2.1;
	local-as 65000;
	peer-as 65100;

	# Enable SR-Policy address families
	family {
		ipv4 sr-policy;
		ipv6 sr-policy;
	}

	static {
		# ================================================================
		# Example 1: Basic MPLS SR-Policy with hierarchical syntax
		# ================================================================
		# Notice how this is much more readable than the inline version!

		sr-policy distinguisher 0 color 100 endpoint 10.1.1.1 {
			next-hop 192.0.2.1;
			preference 100;
			binding-sid mpls 24000;
			segment-list weight 1 {
				segment type-a mpls 16001;
			}
		}

		# ================================================================
		# Example 2: MPLS SR-Policy with multiple segments
		# ================================================================

		sr-policy distinguisher 0 color 200 endpoint 10.2.2.2 {
			next-hop 192.0.2.1;
			preference 100;
			binding-sid mpls 24001;
			segment-list weight 1 {
				segment type-a mpls 16001;
				segment type-a mpls 16002;
				segment type-a mpls 16003;
			}
		}

		# ================================================================
		# Example 3: SR-Policy with multiple segment lists (ECMP/load balancing)
		# ================================================================

		sr-policy distinguisher 0 color 300 endpoint 10.3.3.3 {
			next-hop 192.0.2.1;
			preference 100;
			priority 10;
			binding-sid mpls 24002;

			# Primary path with higher weight
			segment-list weight 10 {
				segment type-a mpls 16001;
				segment type-a mpls 16002;
			}

			# Backup path with lower weight
			segment-list weight 5 {
				segment type-a mpls 17001;
				segment type-a mpls 17002;
			}
		}

		# ================================================================
		# Example 4: SRv6 SR-Policy
		# ================================================================

		sr-policy distinguisher 0 color 400 endpoint 10.4.4.4 {
			next-hop 192.0.2.1;
			preference 100;
			srv6-binding-sid fc00:0:100::1;
			segment-list weight 1 {
				segment type-b srv6 fc00:0:1::;
				segment type-b srv6 fc00:0:2::;
			}
		}

		# ================================================================
		# Example 5: SRv6 with endpoint behavior (uSID)
		# ================================================================

		sr-policy distinguisher 0 color 500 endpoint 10.5.5.5 {
			next-hop 192.0.2.1;
			preference 100;
			srv6-binding-sid fc00:0:200::1;
			segment-list weight 1 {
				segment type-b srv6 fc00:0:3:: endpoint-behavior 65 32 0 16 0;
			}
		}

		# ================================================================
		# Example 6: Named SR-Policy with metadata and BGP attributes
		# ================================================================

		sr-policy distinguisher 1 color 600 endpoint 10.6.6.6 {
			next-hop 192.0.2.1;
			preference 100;
			binding-sid mpls 24003;
			policy-name "low-latency-path";
			candidate-path-name "primary-path-via-core";

			segment-list weight 1 {
				segment type-a mpls 16010;
				segment type-a mpls 16020;
				segment type-a mpls 16030;
			}

			# Standard BGP attributes work too!
			community [no-advertise];
			local-preference 200;
			origin igp;
		}

		# ================================================================
		# Example 7: SR-Policy with multiple BGP communities
		# ================================================================

		sr-policy distinguisher 0 color 700 endpoint 10.7.7.7 {
			next-hop 192.0.2.1;
			preference 150;
			binding-sid mpls 24004;

			segment-list weight 1 {
				segment type-a mpls 16040;
				segment type-a mpls 16050;
			}

			# Multiple communities
			community [65000:100 65000:200 no-export];
			extended-community [target:65000:100];
			large-community [65000:1:100];
			med 50;
		}
	}
}

# ==============================================================================
# Syntax Comparison: Hierarchical vs Inline
# ==============================================================================
#
# HIERARCHICAL (static section) - More readable:
#   static {
#       sr-policy distinguisher 0 color 100 endpoint 10.1.1.1 {
#           next-hop 192.0.2.1;
#           preference 100;
#           binding-sid mpls 24000;
#           segment-list weight 1 {
#               segment type-a mpls 16001;
#           }
#       }
#   }
#
# INLINE (announce section) - More compact:
#   announce {
#       ipv4 {
#           sr-policy distinguisher 0 color 100 endpoint 10.1.1.1 \
#               next-hop 192.0.2.1 \
#               preference 100 \
#               binding-sid mpls 24000 \
#               segment-list weight 1 segment type-a mpls 16001;
#       }
#   }
#
# Both are equivalent - choose based on your preference!
# ==============================================================================
