neighbor 127.0.0.1 {
	router-id 1.2.3.4;
	local-address 127.0.0.1;
	local-as 65533;
	peer-as 65533;

	family {
		ipv4 sr-policy;
		ipv6 sr-policy;
	}

	announce {
		ipv4 {
			sr-policy distinguisher 0 color 100 endpoint 10.0.0.1 \
				next-hop 192.0.2.1 \
				preference 100 \
				binding-sid mpls 24000 \
				segment-list weight 1 segment type-a mpls 16001;

			sr-policy distinguisher 1 color 200 endpoint 10.0.0.2 \
				next-hop 192.0.2.1 \
				preference 200 \
				srv6-binding-sid fc00::1 \
				segment-list weight 2 segment type-b srv6 fc00::1 endpoint-behavior 65 32 0 16 0 \
				policy-name "my-policy" \
				candidate-path-name "primary";

			sr-policy distinguisher 0 color 300 endpoint 10.0.0.3 \
				next-hop 192.0.2.1 \
				preference 300 \
				segment-list weight 1 segment type-a mpls 16001 \
				segment-list weight 2 segment type-a mpls 16002;
		}

		ipv6 {
			sr-policy distinguisher 0 color 100 endpoint 2001:db8::1 \
				next-hop 2001:db8::2 \
				preference 100 \
				segment-list weight 1 segment type-b srv6 2001:db8:1::1;
		}
	}
}
